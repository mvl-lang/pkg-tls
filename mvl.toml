[package]
name             = "tls"
version          = "0.1.0"
license          = "Apache-2.0"
requires-mvl     = ">=0.139.0"
extern-rationale = "wraps rustls (pure-Rust TLS 1.3); no OpenSSL / system TLS dependency"

# Rust backend: bridge.rs uses rustls directly.
# LLVM backend: llvm.rs exposes the same symbols as extern "C" — wired via #811.
[native]
rustls = "0.23"
rustls-pemfile = "2"
webpki-roots = "0.26"
